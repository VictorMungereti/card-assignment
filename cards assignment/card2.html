<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
     
    :root {
    --bg: #f1c797;
    --outline-color:#fff;
    --border: #fce0e0;
    --text-primary: #161616;
    --text-secondary: #cac9c9;
    --accent: #C4E2F5;
    --accent-light: #777;
    --radius-sm: 8px;
    --radius-md:12px;
    --radius-lg:50px;
    --shadow-card:  rgba(0, 0, 0, 0.15) 0px 5px 15px 0px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eee, #ddd);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      flex-wrap: wrap;
      font-family: inherit;
      padding: 2rem;
    }

  
    .card-one {
      background: var(--outline-color);
      border-radius: 2rem;
      padding: 0.75rem;
      width: 20rem;
      height: 30rem;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-one .image-card {
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      background: var(--text-primary);
      flex: 1;
      min-height: 0;
    }

    .card-one .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 5%;
      display: block;
    }

    .card-one .details {
      padding: 0.5rem 0.75rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .card__badge {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
  }
  .card__badge svg { width: 22px; height: 22px; }

    .card-one .details h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .card-one .details p {
      font-size: 0.875rem;
      line-height: 1.45;
      color: var(--text-primary);
    }

    .card-one .details .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.25rem;
    }

    .card-one .details .tag {
      font-size: 0.8rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .card-one .details button {
      border: none;
      border-radius: 2rem;
      background: var(--accent);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.55rem 1.4rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card-one .details button:hover {
      background: #333;
      color: var(--outline-color);
      font-weight: 500;
    }

/* card 2 */

    .card-two {
      width: 20rem;
      border-radius: 2rem;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-card);
      background: #111;
    }

    .card-two img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      object-position: 50% 5%;
      display: block;
    }

    /* frosted overlay pinned to the bottom */
    .card-two .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 1.5rem 1.5rem;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 60%, rgba(0,0,0,0));
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-two .overlay h2 {
      font-size: 1.4rem;
      font-weight: 200;
      color: var(--accent-light);
      letter-spacing: -0.02em;
    }

    .card-two .overlay p {
      font-size: 0.875rem;
      line-height: 1.45;
      color: var(--text-secondary);
      font-weight: 200;
     
    }

    .card-two .overlay .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.35rem;
    }
    .card__footer {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .card__stats {
    display: flex;
    align-items: center;
    gap: 18px;
    flex: 1;
  }
  
  .stat-card-one{
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .stat-card-one svg {
    width: 18px;
    height: 18px;
    color: #111;
    flex-shrink: 0;
  }

  .stat-card-two {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .stat-card-two svg {
    width: 18px;
    height: 18px;
    color: var(--outline-color);
    flex-shrink: 0;
  }

  .card-two .overlay .tag {
      font-size: 0.8rem;
      color: var(--outline-color);
      display: flex;
      align-items: center;
      gap: 0.35rem; 
    }

  .card-two .overlay button {
      border: var(--accent-light);
      border-radius: 2rem;
      background: var(--accent);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.55rem 1.4rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s, border-color 0.2s;
    }

    .card-two .overlay button:hover {
      background: #333;
      color: var(--outline-color);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- Card 1: -->
  <div class="card-one">
    <div class="image-card">
      <img src="images/aizen.jpg" alt="This is the profile picture image" />
    </div>
    <div class="details">
      <h2>Sophie Bennett</h2>
      <span class="card__badge">
        <!-- green verified badge -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L14.39 7.26L20 8.27L16 12.14L17.18 18L12 15.27L6.82 18L8 12.14L4 8.27L9.61 7.26L12 2Z"
            fill="#22c55e" stroke="#22c55e" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12L11 14L15 10" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <p>Product designer who focuses <br> on simplicity & usability</p>
      
      <div class="card__footer">
      <div class="card__stats">
        <div class="stat-card-one">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
          </svg>
          312
        </div>
        <div class="stat-card-one">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="3" width="14" height="18" rx="2"/>
            <path d="M9 7h6M9 11h6M9 15h4"/>
          </svg>
          48
        </div>
      </div>
      <button class="btn-follow">Follow <span class="plus">+</span></button>
    </div>
    </div>
  </div>

  <!-- Card 2: details overlay the image -->
  <div class="card-two">
    <img src="images/aizen.jpg" alt="This is the profile picture image" />
    <div class="overlay">
      <h2>Sophie Bennett</h2>
      <span class="card__badge">
        <!-- green verified badge -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L14.39 7.26L20 8.27L16 12.14L17.18 18L12 15.27L6.82 18L8 12.14L4 8.27L9.61 7.26L12 2Z"
            fill="#22c55e" stroke="#22c55e" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12L11 14L15 10" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <p>Product designer who focuses <br> on simplicity & usability</p>
      <div class="card__footer">
      <div class="card__stats">
        <div class="stat-card-two">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
          </svg>
          312
        </div>
        <div class="stat-card-two">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="3" width="14" height="18" rx="2"/>
            <path d="M9 7h6M9 11h6M9 15h4"/>
          </svg>
          48
        </div>
      </div>
      <button class="btn-follow">Follow <span class="plus">+</span></button>
    </div>
    </div>
  </div>

</body>
</html>
