<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Information card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

    :root {
    --bg: #FFF8F0;
    --card-bg: #69ceec;
    --border: #fce0e0;
    --text-primary: #161616;
    --accent: #C4E2F5;
    --accent-hover: #1591DC;
    --accent-light: #777;
    --radius-sm: 8px;
    --radius-md:12px;
    --radius-lg:50px;
    --shadow-card:  rgba(0, 0, 0, 0.15) 0px 5px 15px 0px;
    }

    *, *::before, *::after 
    { 
        box-sizing: border-box;
        margin: 0; 
        padding: 0; 
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:var(--accent-light);
      font-family: inherit;
    }

    .card {
      position: relative;
      width: 320px;
      border-radius: 32px;
      padding: 28px 28px 28px;
      background: linear-gradient(
        160deg,
        rgba(255,255,255,0.72) 0%,
        rgba(180,230,235,0.55) 55%,
        rgba(160,220,230,0.45) 100%
      );
      
      border: var(--border);
      
    }

    .share-btn {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      
    }
    .share-btn svg 
    { width: 22px; 
      height: 22px;
    
    }

  
    .avatar-wrap {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-lg);
      padding: 3px;
      background: linear-gradient(135deg, #5bbcd6 0%, #a0dde8 100%);
      box-shadow: var(--shadow-card);
      margin-bottom: 16px;
    }
    .avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    
    .name {
      font-size: 1.5rem;
      font-weight: 600;
      color: black;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .title {
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 14px;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .tag {
      padding: 5px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
      border: var(--border);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: var(--shadow-card);
    }

    .stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 16px 0;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      gap: 4px;
    }
    .stat-value {
      font-size: 1.05rem;
      font-weight: 600;
      margin-left: -5px;
      color: black;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--accent-light);
      font-weight: 400;
    }
    /* .fa-solid fa-star { 
         color:black;
         font-size: 1rem;
         } */


    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn-primary {
      flex: 1;
      padding: 15px 0;
      border-radius: 999px;
      border: none;
      background:var(--bg);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--shadow-card);
    }
    

    .btn-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background:var(--bg);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      flex-shrink: 0;
    }

    .btn-icon svg { 
        width: 20px; 
        height: 20px; 
    }
  </style>
</head>
<body>
<!-- card container -->
  <div class="card">

    <!-- Share button  -->
    <button class="share-btn" aria-label="Share">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </button>

     <!-- profile picture -->
    <div class="avatar-wrap">
      <img src="images/ichigo.jpg" alt="This is the profile picture image" />
    </div>

               <!-- name and role -->

    <p class="name">Chloe Harrison</p>
    <p class="title">Product designer</p>

    <!-- Apps used -->
    <div class="tags">
      <span class="tag">Figma</span>
      <span class="tag">UX Design</span>
    </div>

    <!-- Statistics -->
    <div class="stats">
      <div class="stat">
        <span class="stat-value"><span><i class="fa-solid fa-star"></i></span> 4.5</span>
        <span class="stat-label">Rating</span>
      </div>

      <div class="stat">
        <span class="stat-value">$15K+</span>
        <span class="stat-label">Earned</span>
      </div>
      
      <div class="stat">
        <span class="stat-value">$80/hr</span>
        <span class="stat-label">Rate</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button class="btn-primary">Get in touch</button>
      <button class="btn-icon" aria-label="Bookmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </div>

  </div>

</body>
</html>
