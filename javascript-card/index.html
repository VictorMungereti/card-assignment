<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mada:wght@200..900&family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>

        :root {
     --bg:#eeeed9;
     --navbar-bg: #ffffff;
     --navbar-circle-color: #4523c2;
     --nav-secondary-color:  #1a1919;
     --radius-sm: 8px;
     --radius-md:15px;
     --radius-lg:50px;
     --nav-text-primary: #808080;
     --border: 1px solid #0f0f0f;
     --border-secondary:1px solid #b1b1b1;
     --btn-color:  #1E6CE2;
     --secondary-color: #3C364E;
     --tertiary-color: #000000;
     --fourth-color: #818181;
     --star-color:  #f89b21;
     --fifth-color: #4e4e4e;
     --footer-color: #edffed;
     --line-color: #a1a1a1;
     --footware-color::#141007;

     





    }
/* cards section */
body{
    display: grid;
    place-items: center;
}

.cards-container{
    align-items: center;
    display: flex;
    
    
}

.card{
    width: 23%;
    min-width: 250px;
    padding: 10px 12px;
    border:var(--border-secondary);
    border-radius:var(--radius-md);
    cursor: pointer;
    box-shadow: 0 5px 14px rgba(51,102,255,0.24);
    transition: 0.2s ease;
}
.card:hover{
    box-shadow: 0 5px 14px rgba(51,102,255,0.50);
}
.card img{
    width: 100%;
    height: 300px;
    border-radius:var(--radius-md);
    object-fit: cover;
}
/* discount and favorite buttons */

.image-container{
    position: relative;
}

.discount-badge{
    position: absolute;
    top: 10px;
    left: 10px;
    width: 40px;
    height: 40px;
    background: #ff3b30;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Manrope", sans-serif;
    font-size: 12px;
    font-weight: 700;
}

.favorite-btn{
    position: absolute;
    top: 10px;
    right: 10px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #444;
    transition: 0.3s;
}

.card-description{
    margin-top: 8px;
}
.card-description span{
    font-family: "Manrope" , sans-serif;
    font-size: 10px;
    font-weight: 600;
    color:var(--fourth-color);
    display: block;
    margin-bottom: 2px;
}
.card-description h5{
    font-family: "Manrope" , sans-serif;
    /* padding-top: 5px; */
    font-size: 16px;
    font-weight: 600;
    color:var(--tertiary-color);
    margin: 2px 0;

}
.card-description .card-star{
    font-size: 12px;
    color:var(--star-color);
    margin: 2px 0;

}
.card-description h4{
    margin: 4px 0;
    font-family: "Manrope" , sans-serif;
    font-size: 15px;
    font-weight: 800;
}
.card-description .add-cart{
    margin-top: 6px;
    margin-bottom: 7px;
    padding: 10px 20px;
    border-radius:var(--radius-sm);
    background-color:var(--btn-color);
    color:var(--bg);
    border:none;
    outline: none;
    font-family: "Manrope" , sans-serif;
    width: 100%;
}




    </style>
</head>
<body>

         <!-- card 1 -->
        <div class="product-cards"> 
            <div class="card">
                <div class="image-container">
                 <img src="images/new balance.jpg" alt="This is an image of a new balance shoe">
                   <div class="discount-badge">-6%</div>
                       <button class="favorite-btn">
                        <i class="fa-regular fa-heart" onclick="changeIcon(this)"></i>
                        </button>
                </div>
                
                <div class="card-description">
                    <span>FOOTWARE</span>
                    <h5>New Balance</h5>
                    <div class="card-star">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                    </div>
                    <h4>Ksh 3,000</h4>
                  <button class="add-cart" onclick="addToCart(this)">
                   <i class="fa-solid fa-cart-shopping"></i>
                      Add to cart
                  </button>
                </div>
            </div>
            </div>
            <script src="script.js"></script>
    
</body>
</html>
